AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  FitTrack Backend

  SAM Template for FitTrack application

Globals:
  Function:
    Timeout: 30
    MemorySize: 128
    Runtime: python3.9 # Or choose another runtime like nodejs18.x, java11 etc.
    Architectures:
      - x86_64
  Api:
    Auth:
      DefaultAuthorizer: FirebaseAuthorizer
      Authorizers:
        FirebaseAuthorizer:
          FunctionArn: !GetAtt FirebaseAuthorizerFunction.Arn
          FunctionPayloadType: REQUEST
          Identity:
            Headers:
              - Authorization

Resources:
  FirebaseAuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: auth-function/
      Handler: app.lambda_handler
      Environment:
        Variables:
          FIREBASE_CREDENTIALS: !Sub '{{resolve:secretsmanager:${FirebaseCredentialsSecret}}}'
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - 'secretsmanager:GetSecretValue'
              Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${FirebaseCredentialsSecret}'

  UserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: user-function/
      Handler: app.lambda_handler
      Environment:
        Variables:
          MONGODB_URI: !Sub '{{resolve:secretsmanager:${MongoDBURISecret}}}'
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - 'secretsmanager:GetSecretValue'
              Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${MongoDBURISecret}'
      Events:
        GetUser:
          Type: Api
          Properties:
            Path: /user
            Method: get
        CreateUpdateUser:
          Type: Api
          Properties:
            Path: /user
            Method: post

  ExerciseFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: exercise-function/
      Handler: app.lambda_handler
      Environment:
        Variables:
          MONGODB_URI: !Sub '{{resolve:secretsmanager:${MongoDBURISecret}}}'
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - 'secretsmanager:GetSecretValue'
              Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${MongoDBURISecret}'
      Events:
        GetExercises:
          Type: Api
          Properties:
            Path: /exercises
            Method: get
        CreateExercise:
          Type: Api
          Properties:
            Path: /exercises
            Method: post
        UpdateExercise:
          Type: Api
          Properties:
            Path: /exercises/{id}
            Method: put

  HelloWorldFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: app.lambda_handler
      Events:
        HelloWorld:
          Type: Api
          Properties:
            Path: /hello
            Method: get

Parameters:
  FirebaseCredentialsSecret:
    Type: String
    Description: Name of the AWS Secrets Manager secret containing Firebase credentials
  MongoDBURISecret:
    Type: String
    Description: Name of the AWS Secrets Manager secret containing MongoDB URI

Outputs:
  HelloWorldApi:
    Description: "API Gateway endpoint URL for Prod stage for Hello World function"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/hello"
  UserApi:
    Description: "API Gateway endpoint URL for Prod stage for User function"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/user"
  ExerciseApi:
    Description: "API Gateway endpoint URL for Prod stage for Exercise function"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/exercises"
  HelloWorldFunction:
    Description: "Hello World Lambda Function ARN"
    Value: !GetAtt HelloWorldFunction.Arn
  HelloWorldFunctionIamRole:
    Description: "Implicit IAM Role created for Hello World function"
    Value: !GetAtt HelloWorldFunctionRole.Arn 